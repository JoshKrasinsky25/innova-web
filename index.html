<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innova - Base de Datos</title>
    <link rel="stylesheet" href="style.css">
    <!-- Cliente de Supabase vía CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <h1>Innova Tech</h1>
        <p>Conexión directa a la Base de Datos en Supabase</p>
    </header>

    <main class="container">
        <!-- Sección de Login y Registro -->
        <section class="auth-section">
            <div class="card" id="login-card">
                <h2>Iniciar Sesión</h2>
                <form id="login-form">
                    <label for="login-email">Correo Electrónico:</label>
                    <input type="email" id="login-email" required placeholder="correo@innova.com">
                    
                    <label for="login-password">Contraseña:</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                    
                    <button type="submit">Ingresar</button>
                </form>
            </div>

            <div class="card" id="register-card">
                <h2>Registrar Usuario</h2>
                <form id="register-form">
                    <label for="reg-name">Nombre Completo:</label>
                    <input type="text" id="reg-name" required placeholder="Ej. Juan Pérez">

                    <label for="reg-email">Correo Electrónico:</label>
                    <input type="email" id="reg-email" required placeholder="correo@innova.com">
                    
                    <label for="reg-password">Contraseña:</label>
                    <input type="password" id="reg-password" required placeholder="••••••••">
                    
                    <button type="submit">Registrar</button>
                </form>
            </div>
        </section>

        <!-- Sección de Visualización de Datos -->
        <section class="data-section">
            <h2>Nuestros Productos (Desde Supabase)</h2>
            <button id="btn-load-products">Cargar / Actualizar Productos</button>
            <div class="table-container">
                <table id="products-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Descripción</th>
                            <th>Precio</th>
                            <th>Stock</th>
                        </tr>
                    </thead>
                    <tbody id="products-body">
                        <tr>
                            <td colspan="5" style="text-align: center;">Haga clic en el botón para cargar los datos</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
